<!DOCTYPE html>
<html>
<head>
  <title>Antivoid</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('./background.png.png') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: white;
    }

    .box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      
      padding: 60px;
      width: 460px;
      
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);

      border: 2px solid purple;
      border-radius: 20px;
      
      box-shadow: 0 0 25px purple, 0 0 50px rgba(128, 0, 128, 0.5);
      text-align: center;

      transition: all 0.3s ease;
    }

    .box:hover {
      box-shadow: 0 0 40px violet, 0 0 80px rgba(138, 43, 226, 0.7);
      transform: translate(-50%, -50%) scale(1.02);
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
      animation: glow 2s infinite alternate;
    }

    .subtitle {
      opacity: 0.7;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px purple; }
      to { text-shadow: 0 0 30px violet; }
    }

    /* 🔥 아이콘 정렬 */
    .icon-row {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .icon-box {
      display: inline-block;
      padding: 15px;
      border: 2px solid purple;
      border-radius: 15px;

      background-color: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);

      box-shadow: 0 0 20px purple;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .icon-box:hover {
      box-shadow: 0 0 40px violet, 0 0 80px rgba(138, 43, 226, 0.7);
      transform: scale(1.1);
    }

    .icon {
      width: 60px;
      height: auto;
      filter: drop-shadow(0 0 10px purple);
      transition: all 0.3s ease;
    }

    .icon-box:hover .icon {
      transform: scale(1.1);
      filter: drop-shadow(0 0 25px violet);
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      opacity: 0.5;
    }

  </style>
</head>

<body>

  <div class="icon-row">

  <!-- 로블록스 -->
  <a href="https://www.roblox.com/users/4348809472/profile" target="_blank" class="icon-box">
    <img src="roblox2.png" class="icon">
  </a>

  <!-- 디스코드 -->
  <a href="https://discord.gg/abc123" target="_blank" class="icon-box">
    <img src="discord.png" class="icon">
  </a>

  <!-- 유튜브 -->
  <a href="https://www.youtube.com/@antivoid" target="_blank" class="icon-box">
    <img src="youtube.png" class="icon">
  </a>

</div>

</body>
</html>
