<!DOCTYPE html>
<html>
<head>
  <title>Antivoid</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('background.png.png') no-repeat center center fixed;
      background-size: cover;
      font-family: Arial;
      color: white;
    }

    /* 어두운 오버레이 */
    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.75);
      top: 0;
      left: 0;
    }

    /* 중앙 UI 박스 */
    .box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      
      padding: 60px;
      width: 400px;
      
      background: rgba(0,0,0,0.6);
      border: 2px solid purple;
      border-radius: 20px;
      
      box-shadow: 0 0 20px purple, 0 0 60px rgba(128,0,128,0.5);
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px purple;
    }

    /* 로고 */
    .logo {
      width: 150px;
      cursor: pointer;
      transition: 0.3s;
      filter: drop-shadow(0 0 10px purple);
    }

    .logo:hover {
      transform: scale(1.1);
      filter: drop-shadow(0 0 25px violet);
    }

  </style>
</head>

<body>
  <div class="overlay"></div>

  <div class="box">
    <h1>Antivoid</h1>

    <!-- 로고 클릭 시 로블록스 이동 -->
    <a href="https://www.roblox.com/users/4348809472/profile" target="_blank">
      <img src="roblox.jpg" class="logo">
    </a>

  </div>
</body>
</html>
