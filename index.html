<!DOCTYPE html>
<html>
<head>
  <title>Antivoid</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('background.png.png') no-repeat center center fixed;
      background-size: cover;
      font-family: Arial;
      color: white;
    }

    /* 어두운 필터 */
    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.75);
      top: 0;
      left: 0;
    }

    /* 중앙 박스 */
    .box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      
      padding: 50px;
      width: 400px;
      
      background: rgba(0,0,0,0.6);
      border: 2px solid purple;
      border-radius: 20px;
      
      box-shadow: 0 0 20px purple, 0 0 60px rgba(128,0,128,0.5);
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px purple;
    }

    p {
      opacity: 0.8;
      margin-bottom: 30px;
    }

    /* 버튼 */
    .btn {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 80%;
      border-radius: 10px;
      border: 2px solid purple;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: purple;
      box-shadow: 0 0 20px purple;
    }
  </style>
</head>

<body>
  <div class="overlay"></div>

  <div class="box">
    <h1>Antivoid</h1>
    <p>Welcome to my personal website</p>

    <button class="btn">About Me</button>
    <button class="btn">Projects</button>
    <button class="btn">Contact</button>
  </div>
</body>
</html>
