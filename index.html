<!DOCTYPE html>
<html>
<head>
  <title>Antivoid</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('background.png.png') no-repeat center center fixed;
      background-size: cover;
      font-family: Arial;
      color: white;
    }

    /* 중앙 UI 박스 */
    .box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      
      padding: 60px;
      width: 400px;
      
      background: transparent;
      border: 2px solid purple;
      border-radius: 20px;
      
      box-shadow: 0 0 20px purple;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px purple;
    }

    /* 로고 박스 */
    .logo-box {
      display: inline-block;
      padding: 20px;
      border: 2px solid purple;
      border-radius: 15px;
      background: rgba(0,0,0,0.6); /* 여기만 어둡게 */
      box-shadow: 0 0 15px purple;
      transition: 0.3s;
    }

    .logo-box:hover {
      box-shadow: 0 0 30px violet;
      transform: scale(1.05);
    }

    /* 로고 */
    .logo {
      width: 75px;
      height: auto;
      cursor: pointer;
      transition: 0.3s;
      filter: drop-shadow(0 0 10px purple);
    }

    .logo:hover {
      transform: scale(1.1);
      filter: drop-shadow(0 0 25px violet);
    }

  </style>
</head>

<body>

  <div class="box">
    <h1>Antivoid</h1>

    <a href="https://www.roblox.com/users/4348809472/profile" target="_blank">
      <div class="logo-box">
        <img src="roblox2.png" class="logo">
      </div>
    </a>

  </div>
</body>
</html>
